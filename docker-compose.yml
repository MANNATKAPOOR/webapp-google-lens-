version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=*
      - FRONTEND_PATH=/app/frontend_flutter/build/web
    volumes:
      - ./backend:/app/backend
      - ./frontend_flutter/build/web:/app/frontend_flutter/build/web
    restart: unless-stopped
