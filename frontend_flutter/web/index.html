<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI Vision OCR Platform - Extract text, understand images and analyze documents using Artificial Intelligence.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AI Vision OCR Platform</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0F172A;
      overflow: hidden;
    }

    /* Loading screen */
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .loading-title {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #3B82F6;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 1.5rem;
      color: #94A3B8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="loading-title">AI Vision OCR</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading application...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
